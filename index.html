<!DOCTYPE HTML>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Task Lister Lite</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>
  
  <div class="app-container">
    
    <!-- Header Section (Centered at Top) -->
    <header class="main-header">
      <div class="icon-wrapper">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
          <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
        </svg>
      </div>
      <h1>Reminders</h1>
      <p class="subtitle">Task Lister Lite™️</p>
    </header>

    <!-- Input Section (Compact Glass Panel) -->
    <div class="glass-panel input-panel">
      <form id="create-task-form" autocomplete="off">
        <div class="input-group">
          <input type="text" id="new-task-description" name="new-task-description" placeholder="New Task">
          <button type="submit" id="add-btn">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          </button>
        </div>
      </form>
    </div>

    <!-- List Section (Large Glass Panel) -->
    <div class="glass-panel list-panel" id="list">
      <div class="list-header">
        <h2>My List</h2>
        <span class="task-count" id="task-counter">Tasks</span>
      </div>
      <ul id="tasks">
        <!-- Tasks will appear here -->
      </ul>
    </div>

  </div>

  

  <script src="./src/index.js"></script>
</body> 
</html>
